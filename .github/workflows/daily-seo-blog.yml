name: Daily SEO Blog Publish

on:
  workflow_dispatch:
    inputs:
      blog_date:
        description: Optional date to publish/backfill in YYYY-MM-DD format
        required: false
        type: string
  schedule:
    # 7:00 AM Arizona/Pacific during daylight saving time. GitHub cron uses UTC.
    - cron: "0 14 * * *"

permissions:
  contents: write

concurrency:
  group: daily-seo-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemini-2.5-flash' }}
      BLOG_DATE: ${{ github.event.inputs.blog_date || '' }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::Missing repository secret OPENROUTER_API_KEY."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily blog post
        run: npm run blog:generate

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish daily blog post
        run: |
          if git diff --quiet -- client/src/lib/blog-data.ts client/public/sitemap.xml; then
            echo "No blog changes generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/lib/blog-data.ts client/public/sitemap.xml
          git commit -m "Publish daily SEO blog - ${BLOG_DATE:-$(date -u +%Y-%m-%d)}"
          git pull --rebase origin main
          git push origin HEAD:main
